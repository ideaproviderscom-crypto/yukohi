<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>遊興費記録</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif;
    background: #f0f2f5;
    color: #1a1a2e;
    min-height: 100vh;
    padding-bottom: 40px;
  }

  header {
    background: #1a1a2e;
    color: white;
    padding: 18px 20px 14px;
    text-align: center;
  }
  header h1 { font-size: 1.2rem; font-weight: 600; letter-spacing: 0.05em; }

  /* 残高カード */
  .balance-card {
    margin: 16px 16px 0;
    background: white;
    border-radius: 16px;
    padding: 20px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  }

  .balance-label {
    font-size: 0.75rem;
    color: #888;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .balance-amount {
    font-size: 2.6rem;
    font-weight: 700;
    line-height: 1;
    margin-bottom: 4px;
  }

  .balance-amount.ok { color: #16a34a; }
  .balance-amount.warn { color: #d97706; }
  .balance-amount.over { color: #dc2626; }

  .balance-sub {
    font-size: 0.8rem;
    color: #888;
    margin-top: 8px;
    display: flex;
    justify-content: space-between;
  }

  .progress-bar-bg {
    background: #e5e7eb;
    border-radius: 8px;
    height: 8px;
    margin-top: 14px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    border-radius: 8px;
    transition: width 0.4s ease;
  }
  .progress-bar.ok { background: #16a34a; }
  .progress-bar.warn { background: #d97706; }
  .progress-bar.over { background: #dc2626; }

  /* セクションタイトル */
  .section-title {
    font-size: 0.75rem;
    font-weight: 600;
    color: #888;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 20px 20px 8px;
  }

  /* 入力フォーム */
  .form-card {
    margin: 0 16px;
    background: white;
    border-radius: 16px;
    padding: 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  }

  .form-row {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
  }

  .form-row input {
    border: 1.5px solid #e5e7eb;
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 1rem;
    outline: none;
    transition: border-color 0.2s;
    background: #fafafa;
    -webkit-appearance: none;
  }
  .form-row input:focus { border-color: #1a1a2e; background: white; }
  .input-name { flex: 2; }
  .input-amount { flex: 1; min-width: 0; }
  .input-date {
    flex: 1;
    min-width: 0;
    color: #1a1a2e;
  }
  .input-date::-webkit-calendar-picker-indicator { opacity: 0.5; }

  .btn-add {
    width: 100%;
    background: #1a1a2e;
    color: white;
    border: none;
    border-radius: 10px;
    padding: 13px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .btn-add:active { opacity: 0.75; }

  /* 支出リスト */
  .expenses-card {
    margin: 0 16px;
    background: white;
    border-radius: 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    overflow: hidden;
  }

  .expense-item {
    display: flex;
    align-items: center;
    padding: 14px 16px;
    border-bottom: 1px solid #f3f4f6;
    gap: 12px;
  }
  .expense-item:last-child { border-bottom: none; }

  .expense-name {
    flex: 1;
    font-size: 0.95rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .expense-date {
    font-size: 0.75rem;
    color: #aaa;
    white-space: nowrap;
  }
  .expense-amount {
    font-size: 1rem;
    font-weight: 600;
    white-space: nowrap;
    color: #dc2626;
    min-width: 72px;
    text-align: right;
  }
  .btn-delete {
    background: none;
    border: none;
    color: #ccc;
    font-size: 1.1rem;
    cursor: pointer;
    padding: 4px 2px;
    line-height: 1;
    transition: color 0.2s;
  }
  .btn-delete:active { color: #dc2626; }

  .empty-msg {
    text-align: center;
    padding: 32px 16px;
    color: #bbb;
    font-size: 0.9rem;
  }

  /* 予算設定 */
  .budget-card {
    margin: 0 16px;
    background: white;
    border-radius: 16px;
    padding: 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  }
  .budget-row {
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .budget-row input {
    flex: 1;
    border: 1.5px solid #e5e7eb;
    border-radius: 10px;
    padding: 11px 14px;
    font-size: 1rem;
    outline: none;
    background: #fafafa;
    -webkit-appearance: none;
  }
  .budget-row input:focus { border-color: #1a1a2e; background: white; }
  .btn-set {
    background: #6366f1;
    color: white;
    border: none;
    border-radius: 10px;
    padding: 11px 18px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 0.2s;
  }
  .btn-set:active { opacity: 0.75; }

  .month-label {
    font-size: 0.8rem;
    color: #888;
    text-align: center;
    margin-top: 24px;
    padding-bottom: 4px;
  }

  #lockScreen {
    position: fixed; inset: 0; background: #1a1a2e;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 9999;
  }
  #lockScreen h2 { color: white; font-size: 1.1rem; margin-bottom: 24px; letter-spacing: 0.05em; }
  #lockInput {
    width: 200px; padding: 14px; text-align: center; font-size: 1.5rem;
    border: none; border-radius: 12px; letter-spacing: 0.2em;
    margin-bottom: 14px; background: white;
  }
  #lockBtn {
    width: 200px; padding: 13px; background: #6366f1; color: white;
    border: none; border-radius: 12px; font-size: 1rem; font-weight: 600; cursor: pointer;
  }
  #lockError { color: #f87171; font-size: 0.85rem; margin-top: 10px; min-height: 20px; }
</style>
</head>
<body>

<div id="lockScreen">
  <h2>🔒 遊興費記録</h2>
  <input id="lockInput" type="password" inputmode="numeric" placeholder="••••" maxlength="10">
  <button id="lockBtn" onclick="checkPassword()">開く</button>
  <div id="lockError"></div>
</div>

<header>
  <h1>遊興費記録 <span id="syncStatus" style="font-size:0.6em;color:#4caf50;font-weight:normal;"></span></h1>
</header>

<!-- 残高カード -->
<div class="balance-card" id="balanceCard">
  <div class="balance-label">今月の残り</div>
  <div class="balance-amount" id="balanceAmount">¥0</div>
  <div class="balance-sub">
    <span>予算 <b id="budgetLabel">未設定</b></span>
    <span>使用 <b id="usedLabel">¥0</b></span>
  </div>
  <div class="progress-bar-bg">
    <div class="progress-bar ok" id="progressBar" style="width:0%"></div>
  </div>
</div>

<!-- 支出入力 -->
<div class="section-title">支出を追加</div>
<div class="form-card">
  <div class="form-row">
    <input class="input-name" type="text" id="inputName" placeholder="事項（例：映画）" maxlength="30">
    <input class="input-amount" type="number" id="inputAmount" placeholder="金額" min="1" inputmode="numeric">
  </div>
  <div class="form-row">
    <input class="input-date" type="date" id="inputDate">
  </div>
  <button class="btn-add" onclick="addExpense()">追加する</button>
</div>

<!-- 今月の支出リスト -->
<div class="section-title">今月の支出</div>
<div class="expenses-card" id="expensesList"></div>

<!-- 予算設定 -->
<div class="section-title">月次予算の設定</div>
<div class="budget-card">
  <div class="budget-row">
    <input type="number" id="budgetInput" placeholder="例：30000" min="1" inputmode="numeric">
    <button class="btn-set" onclick="setBudget()">設定</button>
  </div>
</div>

<div class="month-label" id="monthLabel"></div>

<script>
// ── Gist同期 (MUST BE FIRST: TDZバグ回避) ──
function _d(e,k){return e.split('').map((c,i)=>String.fromCharCode(c.charCodeAt(0)^k.charCodeAt(i%k.length))).join('');}
const GIST_PAT = _d('\x1e\x1d\x1b\x30\x2c\x21\x3d\x41\x26\x2a\x3b\x03\x13\x03\x0a\x08\x2d\x51\x31\x4c\x0f\x02\x2e\x26\x08\x1a\x0a\x2a\x29\x5f\x29\x20\x25\x5b\x59\x02\x35\x47\x2c\x03','yukohi');
const GIST_ID = '64ffb84bc2e4ef69474e4d8a3714bf33';
let syncTimer = null;

function setSyncStatus(s){const el=document.getElementById('syncStatus');if(!el)return;el.textContent=s==='syncing'?'🔄':s==='synced'?'✓ 同期済み':s==='error'?'⚠ オフライン':'';}

async function syncFromGist(){
  setSyncStatus('syncing');
  try{
    const res=await fetch(`https://api.github.com/gists/${GIST_ID}`,{headers:{'Authorization':`token ${GIST_PAT}`}});
    if(!res.ok)throw new Error();
    const gist=await res.json();
    const tf=gist.files['yukohi_data.json'];
    if(tf){
      const data=JSON.parse(tf.content);
      if(data._synced){
        localStorage.setItem(STORAGE_KEY,JSON.stringify(data));
        render();
        setSyncStatus('synced');
        return;
      }
    }
    await pushToGistNow();
  }catch(e){setSyncStatus('error');}
}

async function pushToGistNow(){
  try{
    setSyncStatus('syncing');
    const data=load();
    data._synced=true;
    const res=await fetch(`https://api.github.com/gists/${GIST_ID}`,{method:'PATCH',headers:{'Authorization':`token ${GIST_PAT}`,'Content-Type':'application/json'},body:JSON.stringify({files:{'yukohi_data.json':{content:JSON.stringify(data)}}})});
    if(!res.ok)throw new Error();
    setSyncStatus('synced');
  }catch(e){setSyncStatus('error');}
}

function schedulePush(){clearTimeout(syncTimer);syncTimer=setTimeout(pushToGistNow,1000);}
// ── ここまでGist同期 ──

const STORAGE_KEY = 'yukohi_v1';

function getYM() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}

function load() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
  catch(e) { return {}; }
}

function save(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  schedulePush();
}

function getData() {
  const all = load();
  const ym = getYM();
  if (!all[ym]) all[ym] = { expenses: [] };
  return { all, ym, month: all[ym] };
}

function getBudget() {
  return parseInt(load().budget || '0') || 0;
}

function fmt(n) {
  return '¥' + Math.abs(n).toLocaleString('ja-JP');
}

function render() {
  const { month } = getData();
  const budget = getBudget();
  const used = month.expenses.reduce((s, e) => s + e.amount, 0);
  const remaining = budget - used;
  const ratio = budget > 0 ? Math.min(used / budget, 1) : 0;

  // 残高表示
  const amtEl = document.getElementById('balanceAmount');
  const barEl = document.getElementById('progressBar');
  let cls = 'ok';
  if (budget > 0) {
    if (ratio >= 1) cls = 'over';
    else if (ratio >= 0.75) cls = 'warn';
  }

  if (budget === 0) {
    amtEl.textContent = '予算未設定';
    amtEl.className = 'balance-amount';
  } else if (remaining < 0) {
    amtEl.textContent = `-${fmt(remaining)}`;
    amtEl.className = `balance-amount ${cls}`;
  } else {
    amtEl.textContent = fmt(remaining);
    amtEl.className = `balance-amount ${cls}`;
  }

  document.getElementById('budgetLabel').textContent = budget > 0 ? fmt(budget) : '未設定';
  document.getElementById('usedLabel').textContent = fmt(used);
  barEl.style.width = (ratio * 100) + '%';
  barEl.className = `progress-bar ${cls}`;

  // 予算入力欄
  if (budget > 0) document.getElementById('budgetInput').placeholder = fmt(budget);

  // 支出リスト（新しい順）
  const list = document.getElementById('expensesList');
  const sorted = [...month.expenses].sort((a,b) => {
    const da = a.date || new Date(a.ts).toISOString().slice(0,10);
    const db = b.date || new Date(b.ts).toISOString().slice(0,10);
    if (db !== da) return db.localeCompare(da);
    return b.ts - a.ts;
  });

  if (sorted.length === 0) {
    list.innerHTML = '<div class="empty-msg">まだ支出がありません</div>';
  } else {
    list.innerHTML = sorted.map(e => {
      const dateStr = e.date || new Date(e.ts).toISOString().slice(0,10);
      const [,mm,dd] = dateStr.split('-');
      const label = `${parseInt(mm)}/${parseInt(dd)}`;
      return `<div class="expense-item">
        <span class="expense-date">${label}</span>
        <span class="expense-name">${escHtml(e.name)}</span>
        <span class="expense-amount">-${fmt(e.amount)}</span>
        <button class="btn-delete" onclick="deleteExpense(${e.ts})" aria-label="削除">✕</button>
      </div>`;
    }).join('');
  }

  // 月ラベル
  const ym = getYM();
  const [y, m] = ym.split('-');
  document.getElementById('monthLabel').textContent = `${y}年${parseInt(m)}月`;
}

function escHtml(s) {
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function addExpense() {
  const name = document.getElementById('inputName').value.trim();
  const amountRaw = document.getElementById('inputAmount').value;
  const amount = parseInt(amountRaw);
  const date = document.getElementById('inputDate').value || todayStr();

  if (!name) { document.getElementById('inputName').focus(); return; }
  if (!amount || amount <= 0) { document.getElementById('inputAmount').focus(); return; }

  // 選択した日付の月に保存
  const ym = date.slice(0, 7);
  const all = load();
  if (!all[ym]) all[ym] = { expenses: [] };
  all[ym].expenses.push({ name, amount, date, ts: Date.now() });
  save(all);

  document.getElementById('inputName').value = '';
  document.getElementById('inputAmount').value = '';
  document.getElementById('inputDate').value = todayStr();
  document.getElementById('inputName').focus();
  render();
}

function deleteExpense(ts) {
  const { all, ym, month } = getData();
  month.expenses = month.expenses.filter(e => e.ts !== ts);
  all[ym] = month;
  save(all);
  render();
}

function setBudget() {
  const val = parseInt(document.getElementById('budgetInput').value);
  if (!val || val <= 0) { document.getElementById('budgetInput').focus(); return; }
  const all = load();
  all.budget = val;
  save(all);
  document.getElementById('budgetInput').value = '';
  render();
}

// Enterキー対応
document.getElementById('inputName').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('inputAmount').focus();
});
document.getElementById('inputAmount').addEventListener('keydown', e => {
  if (e.key === 'Enter') addExpense();
});
document.getElementById('budgetInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') setBudget();
});

document.getElementById('inputDate').value = todayStr();
render();

// パスワード処理
const PW = '8181';
const PW_KEY = 'yukohi_unlocked';

function checkPassword() {
  const val = document.getElementById('lockInput').value;
  if (val === PW) {
    localStorage.setItem(PW_KEY, '1');
    document.getElementById('lockScreen').style.display = 'none';
    syncFromGist();
  } else {
    document.getElementById('lockError').textContent = 'パスワードが違います';
    document.getElementById('lockInput').value = '';
  }
}

document.getElementById('lockInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') checkPassword();
});

if (localStorage.getItem(PW_KEY) === '1') {
  document.getElementById('lockScreen').style.display = 'none';
  syncFromGist();
}
</script>
</body>
</html>
